  <title>NUTRIR &middot; Toolkit da Lideran&ccedil;a</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0F1D6B; --navy-dark: #0a1450;
      --gold: #C9A227; --gold-light: #e8c84a;
      --white: #ffffff; --off-white: #f4f5f9;
      --text-muted: #6b7280; --border: rgba(201,162,39,0.25);
    }
    body { background: var(--off-white); font-family: 'Open Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--navy); position: relative; overflow: hidden; }
    header::before { content: ''; position: absolute; width: 300px; height: 300px; border: 2px solid rgba(201,162,39,0.12); border-radius: 50%; top: -100px; right: -70px; pointer-events: none; }
    header::after { content: ''; position: absolute; width: 190px; height: 190px; border: 2px solid rgba(201,162,39,0.08); border-radius: 50%; top: 50px; right: 50px; pointer-events: none; }
    .header-inner { max-width: 900px; margin: 0 auto; padding: 2.25rem 2rem; position: relative; z-index: 1; }
    .header-nutrir { font-family: 'Montserrat', sans-serif; font-size: 2.8rem; font-weight: 900; color: var(--white); letter-spacing: 0.12em; text-transform: uppercase; }
    .gold-bar { height: 5px; background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%); }
    main { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .section-title { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 1.5rem; letter-spacing: 0.01em; }
    .files-grid { display: grid; gap: 1rem; }
    .file-card { background: var(--white); border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; display: flex; gap: 1.25rem; align-items: center; transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s; position: relative; overflow: hidden; }
    .file-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gold); border-radius: 2px 0 0 2px; }
    .file-card:hover { box-shadow: 0 4px 20px rgba(15,29,107,0.1); border-color: var(--border); transform: translateY(-2px); }
    .file-icon-wrap { width: 54px; height: 54px; background: linear-gradient(135deg, var(--navy) 0%, #1a2d8f 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.6rem; }
    .file-body { flex: 1; min-width: 0; }
    .file-type { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.2rem; }
    .file-name { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1rem; color: var(--navy); margin-bottom: 0.3rem; }
    .file-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.55; }
    .btn-download { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--navy); color: var(--white); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.05em; padding: 0.65rem 1.3rem; border-radius: 8px; text-decoration: none; white-space: nowrap; transition: background 0.15s, transform 0.1s; border: none; cursor: pointer; flex-shrink: 0; }
    .btn-download:hover { background: var(--navy-dark); transform: translateY(-1px); }
    .btn-download svg { width: 14px; height: 14px; }
    footer { background: var(--navy); height: 48px; }
    @media (max-width: 560px) {
      .header-nutrir { font-size: 2rem; }
      .file-card { flex-wrap: wrap; }
      .btn-download { width: 100%; justify-content: center; }
    }
  </style>
</head>

files.forEach(file => {
  let url;

    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: file.mimeType });
    url = URL.createObjectURL(blob);
  } catch(e) { console.error('Erro:', e); return; }
  const card = document.createElement('div');
  card.className = 'file-card';
  card.innerHTML = `

    </a>`;
  list.appendChild(card);
});
